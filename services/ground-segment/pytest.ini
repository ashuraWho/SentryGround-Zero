# pytest configuration for SentryGround-Zero

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    e2e: End-to-end tests requiring external services
    requires_api: Tests requiring API server
    requires_dashboard: Tests requiring Streamlit dashboard
    requires_websocket: Tests requiring WebSocket server
    unit: Unit tests that don't require external services

# Options
addopts = 
    --strict-markers
    -ra
    -v

# Coverage
[coverage:run]
source = secure_eo_pipeline
omit = 
    */tests/*
    */migrations/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
